# CodeQL Security Analysis - AAVA-35
# Scans code for security vulnerabilities and coding errors
# Results visible in GitHub Security tab

name: "CodeQL"

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]
  schedule:
    # Run weekly on Monday at 6am UTC
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze Python Code
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Specify queries: default, security-extended, security-and-quality
        queries: security-extended
        # Audited false-positive suppressions live in the config file.
        # See .github/codeql/codeql-config.yml for the per-file rationale.
        config-file: ./.github/codeql/codeql-config.yml
        # Auto-detect Python version from requirements.txt
        setup-python-dependencies: true

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
        output: sarif-results
        # Upload only after the audited false-positive SARIF filter below.
        upload: failure-only

    - name: Filter audited credential-storage false positives
      uses: advanced-security/filter-sarif@v1
      with:
        input: sarif-results/python.sarif
        output: sarif-results/python.sarif
        patterns: |
          -admin_ui/backend/api/config.py:py/path-injection
          -admin_ui/backend/api/config.py:py/clear-text-storage-sensitive-data
          -src/config/provider_instances.py:py/path-injection
          -src/config/provider_instances.py:py/clear-text-storage-sensitive-data

    - name: Upload filtered SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: sarif-results/python.sarif
